<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stego</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #2a2a3a;
      --accent: #00ffaa;
      --accent2: #7b61ff;
      --danger: #ff4466;
      --text: #e0e0f0;
      --muted: #666680;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    nav {
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      background: var(--surface);
    }
    nav .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
      color: var(--accent);
      letter-spacing: -0.5px;
      text-decoration: none;
    }
    nav .logo span { color: var(--accent2); }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.8rem;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--accent); }
    nav .ml-auto { margin-left: auto; display: flex; gap: 1rem; align-items: center; }
    nav .user-badge {
      font-size: 0.75rem;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.2rem 0.6rem;
      border-radius: 2px;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    h2 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.3rem;
      margin-bottom: 1rem;
    }
    .subtitle { color: var(--muted); font-size: 0.8rem; margin-bottom: 2rem; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .form-group { margin-bottom: 1.2rem; }
    label {
      display: block;
      font-size: 0.75rem;
      color: var(--accent);
      margin-bottom: 0.4rem;
      letter-spacing: 0.05em;
    }
    input[type=text], input[type=password], input[type=number], textarea, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      padding: 0.6rem 0.8rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    input[type=file] {
      background: var(--bg);
      border: 1px dashed var(--border);
      border-radius: 3px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      padding: 0.8rem;
      width: 100%;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    input[type=file]:hover { border-color: var(--accent); }
    .hint { font-size: 0.72rem; color: var(--muted); margin-top: 0.3rem; }
    .btn {
      display: inline-block;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 3px;
      padding: 0.6rem 1.5rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-outline {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    .btn-danger {
      background: var(--danger);
      color: #fff;
    }
    .flash { padding: 0.7rem 1rem; border-radius: 3px; margin-bottom: 1rem; font-size: 0.82rem; }
    .flash.success { background: #0a2a1a; border: 1px solid #00aa55; color: #00ffaa; }
    .flash.error   { background: #2a0a0f; border: 1px solid var(--danger); color: var(--danger); }
    .flash.info    { background: #0a0a2a; border: 1px solid var(--accent2); color: var(--accent2); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
    .tag {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 2px;
      margin-right: 0.3rem;
      background: #1a1a2a;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .post-card { position: relative; overflow: hidden; }
    .post-card img { width: 100%; max-height: 300px; object-fit: cover; border-radius: 2px; margin-bottom: 1rem; }
    .post-meta { font-size: 0.72rem; color: var(--muted); margin-bottom: 0.5rem; }
    .post-caption { font-size: 0.85rem; margin-bottom: 0.8rem; }
    .params-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.6rem 0.8rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .empty { color: var(--muted); font-size: 0.85rem; text-align: center; padding: 3rem; border: 1px dashed var(--border); border-radius: 4px; }
    pre { white-space: pre-wrap; word-break: break-all; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 1rem; font-size: 0.8rem; color: var(--accent); max-height: 300px; overflow-y: auto; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="logo">Stego</a>
    <a href="/">Posts</a>
    {% if user %}
      <a href="/embed">Embed</a>
      <a href="/extract">Extract</a>
    {% endif %}
    <div class="ml-auto">
      {% if user %}
        <span class="user-badge">{{ user }}</span>
        <a href="/logout">Logout</a>
      {% else %}
        <a href="/login" class="btn btn-outline" style="padding:0.3rem 1rem;font-size:0.8rem;">Login</a>
      {% endif %}
    </div>
  </nav>
  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
